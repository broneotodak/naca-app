name: Secret Scan

on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  scan-secrets:
    runs-on: ubuntu-latest
    name: Scan for secrets
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get changed files
        id: changed-files
        run: |
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "files=$(git diff --name-only origin/${{ github.base_ref }}..HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT
          else
            echo "files=$(git diff --name-only HEAD~1..HEAD | tr '\n' ' ')" >> $GITHUB_OUTPUT
          fi
      
      - name: Scan for secrets
        if: steps.changed-files.outputs.files != ''
        run: |
          set -e

          # Secret patterns to check
          patterns=(
            'sk-[A-Za-z0-9_-]{20,}'
            'ghp_[A-Za-z0-9]{36}'
            'gho_[A-Za-z0-9]{36}'
            'github_pat_[A-Za-z0-9]{22}_[A-Za-z0-9]{59}'
            'AKIA[0-9A-Z]{16}'
            'sb-[a-zA-Z0-9]{20,}'
            'eyJ[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}\.[a-zA-Z0-9_-]{10,}'
            'postgres://[^:]+:[^@]+@'
            'postgresql://[^:]+:[^@]+@'
            'ccc_sk_[A-Za-z0-9_]{4,}'
          )

          # Allowlist is sourced from .secretsignore — the SINGLE source of
          # truth shared with the local .githooks/pre-commit hook. Do NOT
          # hardcode a parallel safe-pattern list here: a divergent copy is how
          # the scanner once flagged its own regex DEFINITIONS (.githooks/pre-commit,
          # packages/memory/src/client.js) as secrets. Keep both layers reading
          # the same file. (Mirrors allowlisted_file / allowlisted_line in the hook.)

          # Return 0 if $1 matches any glob/basename/regex entry in .secretsignore
          allowlisted_file() {
            local file="$1"
            [ ! -f ".secretsignore" ] && return 1
            while IFS= read -r pat; do
              [ -z "$pat" ] && continue
              [[ "$pat" =~ ^[[:space:]]*# ]] && continue
              if [[ "$file" == $pat ]]; then return 0; fi
              if [[ "$(basename "$file")" == $pat ]]; then return 0; fi
              if echo "$file" | grep -Eq "$pat"; then return 0; fi
            done < .secretsignore
            return 1
          }

          # Return 0 if $1 (a line of content) matches any token in .secretsignore
          allowlisted_line() {
            local line="$1"
            [ ! -f ".secretsignore" ] && return 1
            while IFS= read -r pat; do
              [ -z "$pat" ] && continue
              [[ "$pat" =~ ^[[:space:]]*# ]] && continue
              if echo "$line" | grep -Eq "$pat"; then return 0; fi
            done < .secretsignore
            return 1
          }

          found_secrets=0

          for file in ${{ steps.changed-files.outputs.files }}; do
            # Skip non-existent, binary, and allowed files
            if [ ! -f "$file" ]; then continue; fi
            if [[ "$file" =~ \.(png|jpg|jpeg|gif|ico|pdf|zip|tar|gz)$ ]]; then continue; fi
            if [[ "$file" =~ \.env\.(template|example)$ ]]; then continue; fi
            if [[ "$file" == ".secretsignore" ]]; then continue; fi

            # Skip entire file if path is allowlisted in .secretsignore
            if allowlisted_file "$file"; then
              echo "ℹ️  Skipping allowlisted file: $file"
              continue
            fi

            # Check for .env files
            if [[ "$file" =~ \.env($|[^.]) ]] && [[ ! "$file" =~ \.(template|example)$ ]]; then
              echo "❌ ERROR: Attempting to commit .env file: $file"
              found_secrets=1
              continue
            fi

            # Check for private key files
            if [[ "$file" =~ \.(pem|key|p12|pfx)$ ]]; then
              echo "❌ ERROR: Attempting to commit private key file: $file"
              found_secrets=1
              continue
            fi

            # Scan file content
            line_no=0
            while IFS= read -r line; do
              line_no=$((line_no+1))

              # Skip lines allowlisted by a token in .secretsignore
              if allowlisted_line "$line"; then
                continue
              fi

              # Check each secret pattern
              for pattern in "${patterns[@]}"; do
                if echo "$line" | grep -Eq "$pattern"; then
                  echo "❌ SECURITY: Potential secret in $file:$line_no"
                  echo "   Pattern: $pattern"
                  echo "   Preview: $(echo "$line" | cut -c1-80)..."
                  found_secrets=1
                  break
                fi
              done
            done < "$file"
          done
          
          if [ $found_secrets -eq 1 ]; then
            echo ""
            echo "⛔ Secret scan failed! Found potential secrets in the code."
            echo "Please remove sensitive data and use environment variables instead."
            exit 1
          fi
          
          echo "✅ Secret scan passed - no secrets detected"