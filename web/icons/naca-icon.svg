<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- NACA app icon · v2 · 2026-05-05
       Designed for legibility at 20x20 (smallest iOS size) up to 1024x1024.
       Primary mark is a bold geometric N — readable as a glyph at any scale.
       Secondary details (scope ring, crosshair, status dots) only register
       at >=128px and add depth without competing with the N. -->

  <!-- Background: deep black, iOS-style rounded square -->
  <rect width="512" height="512" rx="96" fill="#050505"/>

  <!-- Outer scope ring — concentric arcs, fades out at small sizes -->
  <circle cx="256" cy="256" r="232" fill="none" stroke="#00FF41" stroke-width="2" opacity="0.18"/>
  <circle cx="256" cy="256" r="208" fill="none" stroke="#00FF41" stroke-width="1.5" opacity="0.10"/>

  <!-- HUD crosshair tick marks at four cardinal edges -->
  <g stroke="#00FF41" stroke-width="3" opacity="0.30">
    <line x1="256" y1="40" x2="256" y2="76"/>
    <line x1="256" y1="436" x2="256" y2="472"/>
    <line x1="40" y1="256" x2="76" y2="256"/>
    <line x1="436" y1="256" x2="472" y2="256"/>
  </g>

  <!-- Corner brackets (faint command-console framing) -->
  <g fill="none" stroke="#00FF41" stroke-width="3" opacity="0.25">
    <path d="M40,84 L40,40 L84,40"/>
    <path d="M428,40 L472,40 L472,84"/>
    <path d="M472,428 L472,472 L428,472"/>
    <path d="M84,472 L40,472 L40,428"/>
  </g>

  <!-- Status dots in four corners — top-left bright (live), others dimmer -->
  <circle cx="120" cy="120" r="6" fill="#00FF41"/>
  <circle cx="392" cy="120" r="5" fill="#00FF41" opacity="0.55"/>
  <circle cx="120" cy="392" r="5" fill="#00FF41" opacity="0.55"/>
  <circle cx="392" cy="392" r="6" fill="#00FF41"/>

  <!-- THE N — bold geometric letterform, dominant at every size -->
  <!-- Centered: stems at x=148/324, top y=148, bottom y=364, stem width 40 -->
  <g fill="#00FF41">
    <!-- Left vertical stem -->
    <rect x="148" y="148" width="40" height="216"/>
    <!-- Right vertical stem -->
    <rect x="324" y="148" width="40" height="216"/>
    <!-- Diagonal connecting top-left to bottom-right (parallelogram) -->
    <polygon points="148,148 188,148 364,364 324,364"/>
  </g>
</svg>
